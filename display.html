
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Rider Board — Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Libre+Franklin:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f6f1e7; --ink:#16233b; --ink-soft:#516079;
    --cone:#e8721c; --cone-deep:#c25908; --line:#d8cfbd; --card:#fffdf8;
    --deck:#eef3ff; --deck-line:#cdd9f2; --deck-ink:#28406e;
    --shadow:0 2px 0 #e3dac8, 0 12px 30px -16px rgba(22,35,59,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Libre Franklin',system-ui,sans-serif;
    background:radial-gradient(1200px 700px at 85% -15%, #fbf6ec 0%, transparent 60%),var(--paper);
    color:var(--ink);overflow:hidden}
  .screen{height:100vh;display:flex;flex-direction:column;padding:1.4vh 1.4vw 1.2vh}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:2vw;
    border-bottom:0.4vh solid var(--ink);padding-bottom:1vh;margin-bottom:1.2vh;flex:0 0 auto}
  .brand{display:flex;align-items:center;gap:1.2vw}
  .cone-mark{width:5vh;height:5vh;flex:0 0 auto;position:relative}
  .cone-mark::before{content:"";position:absolute;inset:auto 12% 8% 12%;height:0.7vh;border-radius:3px;background:var(--cone-deep)}
  .cone-mark::after{content:"";position:absolute;left:50%;bottom:18%;transform:translateX(-50%);
    width:0;height:0;border-left:1.7vh solid transparent;border-right:1.7vh solid transparent;border-bottom:3.6vh solid var(--cone)}
  h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:4.2vh;line-height:1;letter-spacing:-.01em}
  .sub{color:var(--ink-soft);font-size:1.9vh;font-weight:600;margin-top:.4vh}
  .clock{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:4.6vh;text-align:right;line-height:1}
  .status{font-family:'Libre Franklin';font-size:1.5vh;font-weight:700;letter-spacing:.04em;text-align:right;margin-top:.6vh;
    display:flex;align-items:center;justify-content:flex-end;gap:.6vw;color:var(--ink-soft)}
  .dot{width:1.1vh;height:1.1vh;border-radius:50%;background:#2f9e57;box-shadow:0 0 0 .35vh rgba(47,158,87,.2)}
  .dot.stale{background:#c98a1f;box-shadow:0 0 0 .35vh rgba(201,138,31,.2)}
  .dot.down{background:#c0392b;box-shadow:0 0 0 .35vh rgba(192,57,43,.2)}
  .board{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:1.4vw;min-height:0}
  .col{display:flex;flex-direction:column;min-height:0}
  .row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8vh;flex:0 0 auto}
  .row-name{font-family:'Bricolage Grotesque';font-weight:800;font-size:3.1vh;letter-spacing:-.01em}
  .row-meta{font-family:'Bricolage Grotesque';font-weight:700;font-size:1.8vh;color:#fff;background:var(--ink);padding:.5vh 1.1vh;border-radius:999px;letter-spacing:.03em}
  .zone{font-size:1.6vh;font-weight:800;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;
    display:flex;align-items:center;gap:.7vw;margin-bottom:.7vh}
  .zone .pip{width:1.1vh;height:1.1vh;border-radius:50%;background:var(--cone)}
  .cones{flex:1;display:flex;flex-direction:column;gap:.6vh;min-height:0}
  .cone{flex:1;display:flex;align-items:center;gap:1.2vw;background:var(--card);border:1px solid var(--line);
    border-radius:1.3vh;padding:0 1.2vh;min-height:0;overflow:hidden}
  .cone.empty{background:transparent;border-style:dashed;border-color:#cfc6b3}
  .cone.filled{box-shadow:var(--shadow)}
  .num{flex:0 0 auto;width:5.4vh;height:5.4vh;border-radius:1vh;display:grid;place-items:center;
    font-family:'Bricolage Grotesque';font-weight:800;font-size:2.9vh;background:#efe7d6;color:var(--ink-soft)}
  .cone.filled .num{background:var(--cone);color:#fff;box-shadow:0 .4vh 0 var(--cone-deep)}
  .names{flex:1;min-width:0;line-height:1.05;overflow:hidden}
  .nm{font-weight:800;font-size:2.7vh;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .multi .nm{font-size:2.1vh;font-weight:700}
  .placeholder{color:#c2b89f;font-style:italic;font-weight:600;font-size:2vh}
  .ondeck{flex:0 0 auto;margin-top:1vh;background:var(--deck);border:1px solid var(--deck-line);
    border-radius:1.4vh;padding:1vh 1.2vh}
  .ondeck .zone{color:var(--deck-ink)} .ondeck .zone .pip{background:var(--deck-ink)}
  .chips{display:flex;flex-wrap:wrap;gap:.7vh}
  .chip{background:#fff;border:1px solid var(--deck-line);border-radius:1vh;padding:.7vh 1.1vh;
    font-weight:800;font-size:2.2vh;color:var(--deck-ink)}
  .chip.multi{font-size:1.8vh;font-weight:700}
  .deck-empty{color:#8aa0cc;font-style:italic;font-weight:600;font-size:1.9vh}
  .more{font-size:1.7vh;font-weight:700;color:var(--ink-soft);margin-top:.8vh}
</style>
</head>
<body>
<div class="screen">
  <header class="top">
    <div class="brand">
      <div class="cone-mark"></div>
      <div><h1>Car Rider Board</h1><div class="sub">Oglethorpe County Elementary &middot; afternoon dismissal</div></div>
    </div>
    <div><div class="clock" id="clock">—</div>
      <div class="status"><span id="statusText">connecting…</span><span class="dot down" id="dot"></span></div></div>
  </header>
  <div class="board">
    <section class="col">
      <div class="row-top"><div class="row-name">Row A</div><div class="row-meta" id="metaA"></div></div>
      <div class="zone"><span class="pip"></span>At the cones — loading now</div>
      <div class="cones" id="conesA"></div>
      <div class="ondeck">
        <div class="zone"><span class="pip"></span>On deck — come to the door</div>
        <div class="chips" id="deckA"></div><div class="more" id="moreA"></div>
      </div>
    </section>
    <section class="col">
      <div class="row-top"><div class="row-name">Row B</div><div class="row-meta" id="metaB"></div></div>
      <div class="zone"><span class="pip"></span>At the cones — loading now</div>
      <div class="cones" id="conesB"></div>
      <div class="ondeck">
        <div class="zone"><span class="pip"></span>On deck — come to the door</div>
        <div class="chips" id="deckB"></div><div class="more" id="moreB"></div>
      </div>
    </section>
  </div>
</div>

<script>
  // ============================================================
  //  CONFIG — your live backend. Edit only if you redeploy or
  //  rotate the key.
  // ============================================================
  const API = 'https://script.google.com/macros/s/AKfycbx4S-v420NLWK2-5EYQaxs9-zCzOJpCqA_j4mttcdzCLK7-ePCgUdml5zbLgBGb79XhWg/exec';
  const KEY = 'oces-2026-2027';
  const POLL_MS = 3000;
  // ============================================================

  const SIZE = 10, DECK_SHOWN = 8;
  let rows = { A:{wave:1,queue:[]}, B:{wave:1,queue:[]} };
  let lastOk = 0;

  function tick(){
    const t = new Date();
    document.getElementById('clock').textContent = t.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
    const age = Date.now() - lastOk;
    const dot = document.getElementById('dot'), st = document.getElementById('statusText');
    if(lastOk === 0){ dot.className='dot down'; st.textContent='connecting…'; }
    else if(age < POLL_MS*2.5){ dot.className='dot'; st.textContent='live · updated '+new Date(lastOk).toLocaleTimeString([],{hour:'numeric',minute:'2-digit',second:'2-digit'}); }
    else if(age < 20000){ dot.className='dot stale'; st.textContent='reconnecting…'; }
    else { dot.className='dot down'; st.textContent='connection lost'; }
  }
  setInterval(tick, 1000); tick();

  async function poll(){
    try{
      const u = new URL(API);
      u.searchParams.set('key', KEY);
      u.searchParams.set('action', 'board');
      u.searchParams.set('t', Date.now());
      const r = await fetch(u.toString());
      const data = await r.json();
      if(data && data.A && data.B){ rows = data; lastOk = Date.now(); render(); }
    }catch(e){ /* keep last good board; status dot will show reconnecting */ }
  }
  setInterval(poll, POLL_MS); poll();

  function nameBlock(p){
    if(p.names.length === 1) return '<div class="names"><div class="nm">'+esc(p.names[0])+'</div></div>';
    return '<div class="names multi">'+p.names.map(n=>'<div class="nm">'+esc(n)+'</div>').join('')+'</div>';
  }
  function render(){
    ['A','B'].forEach(row=>{
      const r = rows[row], q = r.queue || [];
      const cones = q.slice(0,SIZE), deck = q.slice(SIZE,SIZE*2), buf = q.slice(SIZE*2);
      const waves = Math.ceil(q.length/SIZE);
      document.getElementById('meta'+row).textContent = 'Wave '+r.wave + (waves>1?' · '+waves+' staged':'');
      const wrap = document.getElementById('cones'+row); wrap.innerHTML='';
      for(let i=0;i<SIZE;i++){
        const c = cones[i]; const div = document.createElement('div');
        div.className = 'cone '+(c?'filled':'empty')+(c&&c.names.length>1?' multi':'');
        div.innerHTML = '<div class="num">'+(i+1)+'</div>'+(c?nameBlock(c):'<div class="names"><span class="placeholder">—</span></div>');
        wrap.appendChild(div);
      }
      const d = document.getElementById('deck'+row); d.innerHTML='';
      if(deck.length===0) d.innerHTML='<div class="deck-empty">no cars staged yet</div>';
      else deck.slice(0,DECK_SHOWN).forEach(p=>{const ch=document.createElement('div');
        ch.className='chip'+(p.names.length>1?' multi':''); ch.textContent=p.names.join(', '); d.appendChild(ch);});
      const hidden = Math.max(0, deck.length-DECK_SHOWN) + buf.length;
      document.getElementById('more'+row).textContent = hidden>0 ? '+ '+hidden+' more in the queue' : '';
    });
  }
  function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
  render();
</script>
</body>
</html>
